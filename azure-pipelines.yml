trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:

# ================= PLAN =================
- stage: Plan
  displayName: "Terraform Plan"
  jobs:
  - job: PlanJob
    steps:

    - script: |
        wget https://releases.hashicorp.com/terraform/1.12.2/terraform_1.12.2_linux_amd64.zip
        unzip terraform_1.12.2_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: "Install Terraform"

    - script: |
        terraform init
      displayName: "Terraform Init"

    - script: |
        terraform validate
      displayName: "Terraform Validate"

    - script: |
        terraform plan -out=tfplan
      displayName: "Terraform Plan"

    - publish: tfplan
      artifact: tfplan

# ================= APPROVAL =================
- stage: Approval
  displayName: "Manual Approval"
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApprovalJob
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Approve Terraform deployment"
        onTimeout: "reject"

# ================= APPLY =================
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Approval
  condition: succeeded()

  jobs:
  - job: ApplyJob
    steps:

    - script: |
        wget https://releases.hashicorp.com/terraform/1.12.2/terraform_1.12.2_linux_amd64.zip
        unzip terraform_1.12.2_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: "Install Terraform"

    - download: current
      artifact: tfplan

    - script: |
        terraform init
      displayName: "Terraform Init"

    - script: |
        terraform apply -auto-approve tfplan/tfplan
      displayName: "Terraform Apply"